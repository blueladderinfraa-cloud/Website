<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Preconnect to external domains for faster loading -->
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />

    <!-- Primary SEO -->
    <title>Blueladder Infra - Leading Construction Company in Gujarat, India</title>
    <meta name="description" content="Blueladder Infra is a trusted construction company in Gujarat, India. We offer residential, commercial, industrial & infrastructure construction services with 18+ years of experience. Get a free quote today." />
    <meta name="keywords" content="construction company Gujarat, building contractor India, residential construction, commercial construction, industrial construction, infrastructure development, Blueladder Infra, construction cost estimator, civil engineering Gujarat" />
    <meta name="author" content="Blueladder Infra" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.blueladderinfra.in/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.blueladderinfra.in/" />
    <meta property="og:title" content="Blueladder Infra - Leading Construction Company in Gujarat, India" />
    <meta property="og:description" content="Trusted construction company offering residential, commercial, industrial & infrastructure construction services. 18+ years of excellence. Get a free quote today." />
    <meta property="og:image" content="https://www.blueladderinfra.in/logo.jpg" />
    <meta property="og:site_name" content="Blueladder Infra" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Blueladder Infra - Leading Construction Company in Gujarat, India" />
    <meta name="twitter:description" content="Trusted construction company offering residential, commercial, industrial & infrastructure construction services. Get a free quote today." />
    <meta name="twitter:image" content="https://www.blueladderinfra.in/logo.jpg" />

    <!-- Geo Tags -->
    <meta name="geo.region" content="IN-GJ" />
    <meta name="geo.placename" content="Gujarat, India" />

    <!-- Favicon & PWA -->
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <link rel="apple-touch-icon" href="/logo.jpg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1e40af" />

    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ConstructionBusiness",
      "name": "Blueladder Infra",
      "url": "https://www.blueladderinfra.in",
      "logo": "https://www.blueladderinfra.in/logo.jpg",
      "image": "https://www.blueladderinfra.in/logo.jpg",
      "description": "Leading construction company in Gujarat, India offering residential, commercial, industrial and infrastructure construction services.",
      "address": {
        "@type": "PostalAddress",
        "addressRegion": "Gujarat",
        "addressCountry": "IN"
      },
      "telephone": "+917778849470",
      "priceRange": "$$",
      "areaServed": {
        "@type": "Place",
        "name": "Gujarat, India"
      },
      "serviceType": ["Residential Construction", "Commercial Construction", "Industrial Construction", "Infrastructure Development"],
      "sameAs": ["https://www.instagram.com/blueladder_infra_"]
    }
    </script>

    <!-- Structured Data - Website -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Blueladder Infra",
      "url": "https://www.blueladderinfra.in",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.blueladderinfra.in/projects?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Google Analytics - only load if GA ID is configured -->
    <script>
      (function() {
        var gaId = '%VITE_GA_ID%';
        if (gaId && gaId !== '' && !gaId.startsWith('%')) {
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://www.googletagmanager.com/gtag/js?id=' + gaId;
          document.head.appendChild(s);
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', gaId);
        }
      })();
    </script>
  </body>

</html>
